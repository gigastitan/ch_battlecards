  :root {
    --hub-bg: #F5F5F5;
    --hub-surface: #FFFFFF;
    --hub-border: #E5E7EB;
    --hub-text: #1F2937;
    --hub-muted: #6B7280;

    --hub-hover: #F9FAFB;

  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--hub-bg);
    color: var(--hub-text);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px 24px 60px;
  }

  .hub-container {
    max-width: 640px;
    width: 100%;
  }

  .hub-header {
    margin-bottom: 48px;
  }

  .hub-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--hub-muted);
    margin-bottom: 16px;
  }

  .hub-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--hub-text);
    letter-spacing: -0.8px;
    margin-bottom: 10px;
  }

  .hub-subtitle {
    font-size: 15px;
    color: var(--hub-muted);
    font-weight: 400;
  }

  .hub-count {
    display: inline-block;
    background: var(--hub-accent);
    color: #FFF;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* ── Competitor List ── */
  .competitor-list {
    background: var(--hub-surface);
    border: 1px solid var(--hub-border);
    border-radius: 12px;
    overflow: hidden;
  }

  .competitor-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    text-decoration: none;
    color: var(--hub-text);
    font-size: 15px;
    font-weight: 500;
    border-bottom: 1px solid var(--hub-divider);
    transition: background 0.15s ease, padding-left 0.15s ease;
  }

  .competitor-link:last-child {
    border-bottom: none;
  }

  .competitor-link:hover {
    background: var(--hub-hover);
    padding-left: 28px;
  }

  .competitor-link .arrow {
    color: var(--hub-muted);
    font-size: 14px;
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity 0.15s ease, transform 0.15s ease;
  }

  .competitor-link:hover .arrow {
    opacity: 1;
    transform: translateX(0);
  }

  /* ── Footer ── */
  .hub-footer {
    margin-top: 40px;
    text-align: center;
    font-size: 12px;
    color: var(--hub-muted);
  }
